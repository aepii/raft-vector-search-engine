name: Build and push Docker images

on:
  push:
    branches:
      - main

# GITHUB_TOKEN needs packages:write to publish to GHCR.
# contents:read is the minimum needed to check out the repo.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Logs in to ghcr.io using the repo's built-in GITHUB_TOKEN —
      # no manual secret or PAT setup required.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Coordinator image is heavy (~1.7 GB) because it bakes in the
      # sentence-transformers model at build time. Expect ~10 min on first
      # run; subsequent runs are faster due to layer caching.
      - name: Build and push coordinator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/coordinator/Dockerfile
          push: true
          tags: ghcr.io/aepii/vector-search-engine-coordinator:latest

      - name: Build and push shard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/shard/Dockerfile
          push: true
          tags: ghcr.io/aepii/vector-search-engine-shard:latest
